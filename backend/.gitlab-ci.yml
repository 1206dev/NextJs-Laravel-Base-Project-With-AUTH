stages:
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/backend
  PHP_VERSION: "8.3"
  MYSQL_DATABASE: laravel_test
  MYSQL_ROOT_PASSWORD: secret

.php_template: &php_template
  image: php:${PHP_VERSION}-cli-alpine
  before_script:
    - apk add --no-cache zip unzip git libpng-dev libjpeg-turbo-dev freetype-dev libzip-dev oniguruma-dev
    - docker-php-ext-configure gd --with-freetype --with-jpeg
    - docker-php-ext-install gd pdo pdo_mysql mbstring zip bcmath
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/

install_dependencies:
  <<: *php_template
  stage: build
  script:
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

test:
  <<: *php_template
  stage: test
  needs: ["install_dependencies"]
  services:
    - mysql:8.0
  variables:
    DB_CONNECTION: mysql
    DB_HOST: mysql
    DB_DATABASE: $MYSQL_DATABASE
    DB_USERNAME: root
    DB_PASSWORD: $MYSQL_ROOT_PASSWORD
  script:
    - cp .env.example .env
    - php artisan key:generate
    - php artisan migrate --force
    - php artisan test --parallel
  allow_failure: false

code_quality:
  <<: *php_template
  stage: test
  needs: ["install_dependencies"]
  script:
    - ./vendor/bin/phpstan analyse --memory-limit=512M || true
    - ./vendor/bin/pint --test || true
  allow_failure: true

build_docker:
  stage: deploy
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
    - develop

deploy_staging:
  stage: deploy
  image: alpine:latest
  needs: ["build_docker"]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$STAGING_SERVER "
        docker pull $DOCKER_IMAGE:latest &&
        docker-compose -f /opt/app/docker-compose.yml up -d backend &&
        docker exec backend php artisan migrate --force"
  environment:
    name: staging
    url: https://api.staging.example.com
  only:
    - develop

deploy_production:
  stage: deploy
  image: alpine:latest
  needs: ["build_docker"]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$PROD_SERVER "
        docker pull $DOCKER_IMAGE:$CI_COMMIT_SHA &&
        docker-compose -f /opt/app/docker-compose.yml up -d backend &&
        docker exec backend php artisan migrate --force"
  environment:
    name: production
    url: https://api.example.com
  only:
    - main
  when: manual
